<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OIO Racing - Photo Staging</title>
<style>
  :root {
    --background: #222222;
    --foreground: #f5f5f5;
    --card: #2a2a2a;
    --secondary: #333333;
    --muted: #3a3a3a;
    --muted-foreground: #a3a3a3;
    --border: #404040;
    --accent-orange: #d97706;
    --accent-orange-hover: #b45309;
    --accent-orange-light: #2a2215;
    --accent-blue: #3b82f6;
    --accent-blue-light: #1a2332;
    --accent-green: #059669;
    --accent-green-light: #1a2e27;
    --accent-red: #991b1b;
    --accent-red-light: #2a1a1a;
    --destructive: #dc2626;
    --radius: 0.5rem;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--background); color: var(--foreground); min-height: 100vh; padding: 32px 20px 64px; }
  h1 { font-size: 20px; font-weight: 600; color: var(--foreground); margin-bottom: 4px; }
  .sub { font-size: 13px; color: var(--muted-foreground); margin-bottom: 24px; }

  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .tab { padding: 10px 20px; font-size: 13px; color: var(--muted-foreground); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
  .tab.active { color: var(--foreground); border-bottom-color: var(--accent-orange); }

  .drop-zone { border: 2px dashed var(--border); border-radius: calc(var(--radius) * 1.75); padding: 52px 24px; text-align: center; cursor: pointer; margin-bottom: 16px; transition: border-color 0.2s, background 0.2s; }
  .drop-zone:active, .drop-zone.dragover { border-color: var(--accent-blue); background: var(--accent-blue-light); }
  .drop-zone .icon { font-size: 32px; margin-bottom: 12px; }
  .drop-zone p { font-size: 15px; color: var(--muted-foreground); margin-bottom: 6px; }
  .drop-zone span { font-size: 12px; color: var(--muted-foreground); opacity: 0.6; }

  .previews { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .preview { position: relative; aspect-ratio: 1; border-radius: calc(var(--radius) * 1.25); overflow: hidden; background: var(--secondary); }
  .preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .preview .remove { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: rgba(0,0,0,0.75); border-radius: 50%; border: none; color: var(--foreground); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }

  .picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .photo-card { position: relative; aspect-ratio: 1; border-radius: calc(var(--radius) * 1.5); overflow: hidden; cursor: pointer; border: 3px solid transparent; background: var(--secondary); transition: border-color 0.15s, transform 0.1s; }
  .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-card.selected { border-color: var(--accent-orange); transform: scale(0.97); }
  .photo-card .num { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.65); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
  .photo-card .check { position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; background: var(--accent-orange); border-radius: 50%; display: none; align-items: center; justify-content: center; }
  .photo-card.selected .check { display: flex; }
  .photo-card .del { position: absolute; top: 5px; left: 5px; width: 22px; height: 22px; background: rgba(0,0,0,0.65); border-radius: 50%; border: none; color: var(--muted-foreground); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .photo-card .del:hover { background: rgba(180,30,30,0.85); color: #fff; }

  .btn { display: block; width: 100%; padding: 15px; border: none; border-radius: calc(var(--radius) * 1.25); font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 10px; transition: background 0.15s; }
  .btn-primary { background: var(--accent-orange); color: var(--foreground); }
  .btn-primary:hover:not(:disabled) { background: var(--accent-orange-hover); }
  .btn-primary:disabled { background: var(--accent-orange-light); color: var(--muted-foreground); cursor: default; }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--muted-foreground); font-size: 13px; padding: 10px; }
  .btn-secondary:hover { background: var(--card); }

  .progress { background: var(--card); border-radius: calc(var(--radius) * 1.25); padding: 16px; margin-bottom: 12px; display: none; }
  .progress p { font-size: 13px; color: var(--muted-foreground); margin-bottom: 8px; }
  .bar-wrap { background: var(--secondary); border-radius: 4px; height: 4px; }
  .bar { background: var(--accent-blue); height: 4px; border-radius: 4px; width: 0%; transition: width 0.25s; }

  .toast { border-radius: calc(var(--radius) * 1.25); padding: 16px; margin-bottom: 12px; display: none; }
  .toast.success { background: var(--accent-green-light); border: 1px solid var(--accent-green); }
  .toast.success p { font-size: 15px; color: var(--accent-green); font-weight: 500; }
  .toast.success span { font-size: 12px; color: var(--muted-foreground); display: block; margin-top: 4px; }
  .toast.error { background: var(--accent-red-light); border: 1px solid var(--accent-red); font-size: 13px; color: var(--destructive); }

  .toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
  .toolbar button { background: transparent; border: 1px solid var(--border); color: var(--muted-foreground); padding: 6px 14px; border-radius: var(--radius); cursor: pointer; font-size: 12px; transition: background 0.15s; }
  .toolbar button:hover { background: var(--card); }
  .sel-count { font-size: 12px; color: var(--muted-foreground); margin-left: auto; }

  .context-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: calc(var(--radius) * 1.25); color: var(--foreground); padding: 12px 14px; font-size: 14px; margin-bottom: 10px; outline: none; transition: border-color 0.15s; }
  .context-input:focus { border-color: var(--accent-orange); }
  .context-input::placeholder { color: var(--muted-foreground); opacity: 0.6; }

  .prompt-box { background: var(--card); border: 1px solid var(--border); border-radius: calc(var(--radius) * 1.25); padding: 14px; margin-bottom: 10px; font-size: 12px; color: var(--muted-foreground); line-height: 1.6; word-break: break-all; display: none; }

  .state-msg { text-align: center; padding: 48px 20px; color: var(--muted-foreground); font-size: 14px; line-height: 1.8; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--muted-foreground); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>OIO Racing</h1>
<p class="sub">Instagram photo staging</p>

<div class="tabs">
  <div class="tab active" id="tabUpload" onclick="showTab('upload')">Upload</div>
  <div class="tab" id="tabPick" onclick="showTab('pick')">Pick &amp; post</div>
</div>

<!-- UPLOAD -->
<div id="paneUpload">
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📷</div>
    <p>Tap to select photos</p>
    <span>JPG · PNG · HEIC · WebP</span>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
  <div class="previews" id="uploadPreviews"></div>
  <div class="progress" id="uploadProgress">
    <p id="uploadProgressText">Uploading...</p>
    <div class="bar-wrap"><div class="bar" id="uploadBar"></div></div>
  </div>
  <div class="toast error" id="uploadError"></div>
  <div class="toast success" id="uploadSuccess">
    <p id="uploadSuccessMsg">Photos uploaded!</p>
    <span>Switch to "Pick &amp; post" to build your post</span>
  </div>
  <button class="btn btn-primary" id="uploadBtn" disabled onclick="upload()">Upload photos</button>
  <button class="btn btn-secondary" onclick="clearUpload()">Clear</button>
</div>

<!-- PICK -->
<div id="panePick" style="display:none;">
  <div class="state-msg" id="pickLoading"><span class="spinner"></span>Loading staged photos...</div>
  <div id="pickContent" style="display:none;">
    <div class="toolbar">
      <button onclick="selectAll()">Select all</button>
      <button onclick="clearSel()">Clear</button>
      <button onclick="loadPhotos()">Refresh</button>
      <span class="sel-count" id="selCount">0 selected</span>
    </div>
    <div class="picker-grid" id="pickerGrid"></div>
    <input class="context-input" type="text" id="contextInput" placeholder="Context for caption (e.g. KCR autocross, March 2026)" />
    <button class="btn btn-primary" id="buildBtn" disabled onclick="buildPrompt()">Build post prompt</button>
    <div class="prompt-box" id="promptBox"></div>
    <button class="btn btn-secondary" id="copyBtn" style="display:none;" onclick="copyPrompt()">Copy prompt to clipboard</button>
  </div>
  <div class="state-msg" id="pickEmpty" style="display:none;">No staged photos yet.<br>Upload some first.</div>
</div>
