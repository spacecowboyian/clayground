<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OIO Racing - Photo Upload</title>
<style>
  :root {
    --background: #222222;
    --foreground: #f5f5f5;
    --card: #2a2a2a;
    --secondary: #333333;
    --muted: #3a3a3a;
    --muted-foreground: #a3a3a3;
    --border: #404040;
    --accent-orange: #d97706;
    --accent-orange-hover: #b45309;
    --accent-orange-light: #2a2215;
    --accent-blue: #3b82f6;
    --accent-blue-light: #1a2332;
    --accent-green: #059669;
    --accent-green-light: #1a2e27;
    --accent-red: #991b1b;
    --accent-red-light: #2a1a1a;
    --destructive: #dc2626;
    --radius: 0.5rem;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--background); color: var(--foreground); min-height: 100vh; padding: 32px 20px; }
  h1 { font-size: 20px; font-weight: 600; color: var(--foreground); margin-bottom: 4px; }
  .sub { font-size: 13px; color: var(--muted-foreground); margin-bottom: 28px; }
  .drop-zone { border: 2px dashed var(--border); border-radius: calc(var(--radius) * 1.75); padding: 52px 24px; text-align: center; cursor: pointer; margin-bottom: 16px; transition: border-color 0.2s, background 0.2s; }
  .drop-zone:active, .drop-zone.dragover { border-color: var(--accent-blue); background: var(--accent-blue-light); }
  .drop-zone .icon { font-size: 32px; margin-bottom: 12px; }
  .drop-zone p { font-size: 15px; color: var(--muted-foreground); margin-bottom: 6px; }
  .drop-zone span { font-size: 12px; color: var(--muted-foreground); }
  .previews { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .preview { position: relative; aspect-ratio: 1; border-radius: calc(var(--radius) * 1.25); overflow: hidden; background: var(--secondary); }
  .preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .preview .remove { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: rgba(0,0,0,0.75); border-radius: 50%; border: none; color: var(--foreground); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
  .btn { display: block; width: 100%; padding: 15px; border: none; border-radius: calc(var(--radius) * 1.25); font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 10px; transition: background 0.15s, opacity 0.15s; }
  .btn-primary { background: var(--accent-orange); color: var(--foreground); }
  .btn-primary:hover:not(:disabled) { background: var(--accent-orange-hover); }
  .btn-primary:disabled { background: var(--accent-orange-light); color: var(--muted-foreground); cursor: default; }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--muted-foreground); font-size: 13px; padding: 10px; }
  .btn-secondary:hover { background: var(--card); }
  .progress { background: var(--card); border-radius: calc(var(--radius) * 1.25); padding: 16px; margin-bottom: 12px; display: none; }
  .progress p { font-size: 13px; color: var(--muted-foreground); margin-bottom: 8px; }
  .bar-wrap { background: var(--secondary); border-radius: 4px; height: 4px; }
  .bar { background: var(--accent-blue); height: 4px; border-radius: 4px; width: 0%; transition: width 0.25s; }
  .success { background: var(--accent-green-light); border: 1px solid var(--accent-green); border-radius: calc(var(--radius) * 1.25); padding: 20px; text-align: center; display: none; margin-bottom: 12px; }
  .success .check { font-size: 28px; margin-bottom: 8px; }
  .success p { font-size: 15px; color: var(--accent-green); font-weight: 500; }
  .success span { font-size: 12px; color: var(--muted-foreground); display: block; margin-top: 6px; }
  .error { background: var(--accent-red-light); border: 1px solid var(--accent-red); border-radius: calc(var(--radius) * 1.25); padding: 14px; font-size: 13px; color: var(--destructive); display: none; margin-bottom: 12px; }

  /* Library */
  .section-divider { border: none; border-top: 1px solid var(--border); margin: 28px 0 20px; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .library-loading { font-size: 13px; color: var(--muted-foreground); text-align: center; padding: 24px 0; }
  .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .lib-photo { position: relative; aspect-ratio: 1; border-radius: calc(var(--radius) * 1.25); overflow: hidden; background: var(--secondary); cursor: pointer; outline: 3px solid transparent; transition: outline-color 0.15s; }
  .lib-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .lib-photo.selected { outline-color: var(--accent-orange); }
  .lib-photo .check-badge { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: var(--accent-orange); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-weight: 700; }
  .lib-photo.selected .check-badge { display: flex; }
  .prompt-box { background: var(--card); border: 1px solid var(--border); border-radius: calc(var(--radius) * 1.25); padding: 14px; font-size: 12px; color: var(--muted-foreground); font-family: monospace; white-space: pre-wrap; word-break: break-all; margin-bottom: 12px; display: none; line-height: 1.6; }
</style>
</head>
<body>

<h1>OIO Racing</h1>
<p class="sub">Stage photos for Instagram</p>

<div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
  <div class="icon">&#128247;</div>
  <p>Tap to select photos</p>
  <span>JPG, PNG, HEIC supported</span>
</div>
<input type="file" id="fileInput" accept="image/*" multiple style="display:none">

<div class="previews" id="previews"></div>

<div class="progress" id="progress">
  <p id="progressText">Uploading...</p>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
</div>

<div class="error" id="errorBox"></div>

<div class="success" id="success">
  <div class="check">&#10003;</div>
  <p id="successMsg">Photos uploaded!</p>
  <span>Go tell Claude the photos are ready</span>
</div>

<button class="btn btn-primary" id="uploadBtn" disabled onclick="upload()">Upload photos</button>
<button class="btn btn-secondary" onclick="clearAll()">Clear</button>

<hr class="section-divider">
<p class="section-title">Library — tap to select for post</p>
<div class="library-loading" id="libraryLoading">Loading photos...</div>
<div class="library-grid" id="libraryGrid"></div>

<div class="prompt-box" id="promptBox"></div>
<button class="btn btn-primary" id="copyBtn" style="display:none" onclick="copyPrompt()">Copy prompt for Claude</button>

<script>
const SUPABASE_URL = 'https://zdjughkxryhabduhsdgg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkanVnaGt4cnloYWJkdWhzZGdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTI0OTksImV4cCI6MjA4OTM2ODQ5OX0.9mXN--D-e-0MNE6cGxlYOefTiZk8nHp12BpVx0mm7lY';
const BUCKET = 'oio-photos';

let files = [];

const fileInput = document.getElementById('fileInput');
const previews = document.getElementById('previews');
const uploadBtn = document.getElementById('uploadBtn');
const progress = document.getElementById('progress');
const bar = document.getElementById('bar');
const progressText = document.getElementById('progressText');
const successDiv = document.getElementById('success');
const errorBox = document.getElementById('errorBox');
const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => addFiles(e.target.files));

function addFiles(newFiles) {
  for (const f of newFiles) {
    if (!files.find(x => x.name === f.name && x.size === f.size)) files.push(f);
  }
  renderPreviews();
  uploadBtn.disabled = files.length === 0;
  successDiv.style.display = 'none';
  errorBox.style.display = 'none';
}

function renderPreviews() {
  previews.innerHTML = '';
  files.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'preview';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(f);
    const btn = document.createElement('button');
    btn.className = 'remove';
    btn.innerHTML = '&times;';
    btn.onclick = e => { e.stopPropagation(); files.splice(i, 1); renderPreviews(); uploadBtn.disabled = files.length === 0; };
    div.appendChild(img);
    div.appendChild(btn);
    previews.appendChild(div);
  });
}

function clearAll() {
  files = [];
  renderPreviews();
  uploadBtn.disabled = true;
  successDiv.style.display = 'none';
  errorBox.style.display = 'none';
  fileInput.value = '';
}

async function upload() {
  if (!files.length) return;
  uploadBtn.disabled = true;
  progress.style.display = 'block';
  successDiv.style.display = 'none';
  errorBox.style.display = 'none';

  let done = 0;
  let errors = 0;

  for (const file of files) {
    progressText.textContent = `Uploading ${done + 1} of ${files.length}...`;
    try {
      const ext = file.name.split('.').pop().toLowerCase() || 'jpg';
      const filename = `${uuid()}.${ext}`;

      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${filename}`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': file.type,
          'x-upsert': 'false'
        },
        body: file
      });

      if (!uploadRes.ok) { errors++; continue; }

      const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${filename}`;

      await fetch(`${SUPABASE_URL}/rest/v1/photos`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'apikey': SUPABASE_ANON_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ filename, url: publicUrl, size_bytes: file.size })
      });

    } catch(e) { errors++; }
    done++;
    bar.style.width = Math.round(done / files.length * 100) + '%';
  }

  progress.style.display = 'none';
  const uploaded = done - errors;

  if (errors > 0) {
    errorBox.textContent = `${errors} photo${errors > 1 ? 's' : ''} failed to upload. Check your connection and try again.`;
    errorBox.style.display = 'block';
  }

  if (uploaded > 0) {
    document.getElementById('successMsg').textContent = `${uploaded} photo${uploaded > 1 ? 's' : ''} uploaded!`;
    successDiv.style.display = 'block';
    clearAll();
    // Refresh library so new photos appear
    document.getElementById('libraryGrid').innerHTML = '';
    document.getElementById('libraryLoading').style.display = 'block';
    document.getElementById('libraryLoading').textContent = 'Loading photos...';
    loadLibrary();
  } else {
    uploadBtn.disabled = false;
  }
}

function uuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// ── Library ──────────────────────────────────────────────
let selectedUrls = new Set();

async function loadLibrary() {
  const grid = document.getElementById('libraryGrid');
  const loading = document.getElementById('libraryLoading');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/photos?order=created_at.desc&limit=100`, {
      headers: {
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'apikey': SUPABASE_ANON_KEY
      }
    });
    if (!res.ok) throw new Error();
    const photos = await res.json();
    loading.style.display = 'none';
    if (!photos.length) {
      loading.textContent = 'No photos uploaded yet.';
      loading.style.display = 'block';
      return;
    }
    photos.forEach(p => {
      const div = document.createElement('div');
      div.className = 'lib-photo';
      div.dataset.url = p.url;
      const img = document.createElement('img');
      img.src = p.url;
      img.alt = p.filename || '';
      const badge = document.createElement('span');
      badge.className = 'check-badge';
      badge.textContent = '✓';
      div.appendChild(img);
      div.appendChild(badge);
      div.addEventListener('click', () => toggleSelect(div, p.url));
      grid.appendChild(div);
    });
  } catch {
    loading.textContent = 'Failed to load library.';
  }
}

function toggleSelect(el, url) {
  if (selectedUrls.has(url)) {
    selectedUrls.delete(url);
    el.classList.remove('selected');
  } else {
    selectedUrls.add(url);
    el.classList.add('selected');
  }
  updatePrompt();
}

function updatePrompt() {
  const promptBox = document.getElementById('promptBox');
  const copyBtn = document.getElementById('copyBtn');
  if (!selectedUrls.size) {
    promptBox.style.display = 'none';
    copyBtn.style.display = 'none';
    return;
  }
  const urlList = [...selectedUrls].map(u => `- ${u}`).join('\n');
  promptBox.textContent = `Here are the image URLs for the next OIO Racing Instagram post:\n\n${urlList}\n\nPlease create the post and send it via the post bridge.`;
  promptBox.style.display = 'block';
  copyBtn.style.display = 'block';
}

async function copyPrompt() {
  const text = document.getElementById('promptBox').textContent;
  await navigator.clipboard.writeText(text);
  const btn = document.getElementById('copyBtn');
  const orig = btn.textContent;
  btn.textContent = 'Copied!';
  setTimeout(() => { btn.textContent = orig; }, 1800);
}

loadLibrary();
</script>
</body>
</html>
