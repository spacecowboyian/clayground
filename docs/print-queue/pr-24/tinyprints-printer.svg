<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Printer body outer shell -->
  <rect x="14" y="22" width="172" height="162" rx="18" ry="18" fill="#2c2c2e" stroke="#111" stroke-width="4"/>

  <!-- Top panel (darker cap) -->
  <rect x="14" y="22" width="172" height="38" rx="18" ry="18" fill="#1a1a1c" stroke="#111" stroke-width="3"/>
  <rect x="14" y="44" width="172" height="16" fill="#1a1a1c"/>

  <!-- LCD screen on top panel -->
  <rect x="118" y="31" width="38" height="22" rx="5" fill="#4fc3f7" opacity="0.9"/>
  <rect x="120" y="33" width="34" height="18" rx="4" fill="#81d4fa" opacity="0.7"/>
  <!-- Screen shine -->
  <rect x="122" y="34" width="12" height="4" rx="2" fill="white" opacity="0.5"/>

  <!-- Two round buttons next to screen -->
  <circle cx="166" cy="37" r="5" fill="#555" stroke="#333" stroke-width="1.5"/>
  <circle cx="166" cy="51" r="5" fill="#555" stroke="#333" stroke-width="1.5"/>

  <!-- Printer body sides — silver/aluminum trim -->
  <rect x="14" y="60" width="14" height="116" rx="4" fill="#a0a0a8" stroke="#888" stroke-width="1.5"/>
  <rect x="172" y="60" width="14" height="116" rx="4" fill="#a0a0a8" stroke="#888" stroke-width="1.5"/>

  <!-- Glass front panel -->
  <rect x="28" y="60" width="144" height="118" rx="2" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>

  <!-- Door handle (right side) -->
  <rect x="174" y="105" width="10" height="32" rx="5" fill="#c0c0c8" stroke="#999" stroke-width="1.5"/>

  <!-- Interior back wall -->
  <rect x="32" y="64" width="136" height="110" rx="2" fill="#181818"/>

  <!-- Gantry top rail (horizontal bar across top) -->
  <rect x="34" y="72" width="132" height="7" rx="3" fill="#555" stroke="#333" stroke-width="1"/>
  <!-- Left vertical rail -->
  <rect x="34" y="72" width="7" height="80" rx="3" fill="#555" stroke="#333" stroke-width="1"/>
  <!-- Right vertical rail -->
  <rect x="159" y="72" width="7" height="80" rx="3" fill="#555" stroke="#333" stroke-width="1"/>

  <!-- Print head carriage -->
  <rect x="88" y="68" width="24" height="18" rx="4" fill="#3a3a3a" stroke="#222" stroke-width="2"/>
  <!-- Print head nozzle -->
  <rect x="96" y="86" width="8" height="12" rx="2" fill="#2a2a2a" stroke="#111" stroke-width="1.5"/>
  <!-- Nozzle tip with heat glow -->
  <circle cx="100" cy="100" r="3" fill="#f59e0b" opacity="0.9"/>

  <!-- Build plate -->
  <rect x="40" y="148" width="120" height="14" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1.5"/>
  <!-- Plate surface sheen -->
  <rect x="44" y="150" width="112" height="6" rx="3" fill="#383838"/>

  <!-- Shadow under heart on plate -->
  <ellipse cx="100" cy="148" rx="28" ry="5" fill="#111" opacity="0.5"/>

  <!-- Heart being printed — glossy pink/magenta -->
  <path d="M100 143
           C100 143 68 122 68 107
           C68 96 76 88 86 88
           C92 88 97 91 100 95
           C103 91 108 88 114 88
           C124 88 132 96 132 107
           C132 122 100 143 100 143 Z"
        fill="#f43f5e" stroke="#c2185b" stroke-width="2.5"/>

  <!-- Heart highlight (gloss) -->
  <path d="M83 95 C83 95 88 89 95 91" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <ellipse cx="87" cy="97" rx="5" ry="3" fill="white" opacity="0.25" transform="rotate(-30 87 97)"/>

  <!-- Bottom base feet -->
  <rect x="30" y="178" width="32" height="8" rx="4" fill="#222" stroke="#111" stroke-width="1"/>
  <rect x="138" y="178" width="32" height="8" rx="4" fill="#222" stroke="#111" stroke-width="1"/>
</svg>
