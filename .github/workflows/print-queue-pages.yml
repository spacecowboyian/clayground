# Manually rebuild and deploy the print-queue app to GitHub Pages.
# Useful after updating Supabase secrets without changing any source files.
#
# Required repo secrets (Settings → Secrets → Actions):
#   VITE_SUPABASE_URL          — Supabase project URL
#   VITE_SUPABASE_ANON_KEY     — Supabase anon/public key
#   VITE_PRINT_QUEUE_PASSWORD  — (optional) dashboard password; defaults to "beeps"
name: Print Queue — Build & Deploy

on:
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build print-queue
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projects/print-queue/package-lock.json

      - name: Build
        working-directory: projects/print-queue
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PRINT_QUEUE_PASSWORD: ${{ secrets.VITE_PRINT_QUEUE_PASSWORD }}
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
